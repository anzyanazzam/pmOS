name: Build postmarketOS
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip git openssl openssh-client
          git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git

      - name: Initialize pmbootstrap (Non-Interactive)
        run: |
          pip3 install pexpect
          
          cat << 'EOF' > init_pmbootstrap.py
          import pexpect
          import sys
          
          child = pexpect.spawn('./pmbootstrap/pmbootstrap.py init', encoding='utf-8')
          child.logfile = sys.stdout
          
          def answer(pattern, text):
              try:
                  child.expect(pattern, timeout=5)
                  child.sendline(text)
              except pexpect.TIMEOUT:
                  pass
          
          answer(r"Work path.*?:\s*", "")
          answer(r"pmaports.*?path.*?:\s*", "")
          answer(r"Channel.*?:\s*", "")
          answer(r"Vendor.*?:\s*", "xiaomi")
          answer(r"Device.*?:\s*", "onclite")
          answer(r"Continue\?.*?:\s*", "y") # Archived warning
          answer(r"Enable this package.*?:\s*", "y") # If it asks
          answer(r"Username.*?:\s*", "pmos")
          answer(r"User interface.*?:\s*", "console")
          answer(r"Install systemd.*?:\s*", "")
          answer(r"Provider.*?:\s*", "") # audio
          answer(r"Provider.*?:\s*", "") # wifi
          answer(r"Provider.*?:\s*", "") # usb-moded
          answer(r"Change them.*?:\s*", "n")
          answer(r"Extra packages.*?:\s*", "networkmanager,bluez,picocom,screen,nano,postmarketos-custom-config")
          answer(r"timezone.*?:\s*", "GMT")
          answer(r"Use this timezone.*?:\s*", "y")
          answer(r"Locale.*?:\s*", "")
          answer(r"Continue\?.*?:\s*", "y") # Locale warning
          answer(r"mirror.*?:\s*", "")
          answer(r"After reviewing.*?:\s*", "y")
          
          try:
              child.expect(pexpect.EOF, timeout=120)
          except pexpect.TIMEOUT:
              print("\n\nTIMEOUT OCCURRED AT END!")
          EOF
          
          python3 init_pmbootstrap.py
          
          ./pmbootstrap/pmbootstrap.py update

      - name: Create Custom Config Package
        run: |
          mkdir -p ~/.local/var/pmbootstrap/cache_git/pmaports/main/postmarketos-custom-config
          
          cat << 'EOF' > ~/.local/var/pmbootstrap/cache_git/pmaports/main/postmarketos-custom-config/APKBUILD
          pkgname=postmarketos-custom-config
          pkgver=1.0
          pkgrel=0
          pkgdesc="Custom Configs for PMOS Hotspot and Bluetooth"
          url="https://postmarketos.org"
          arch="all"
          license="GPL-3.0-or-later"
          depends="networkmanager bluez"
          source="PMOS.nmconnection postmarketos-custom-config.post-install"
          
          package() {
            install -Dm600 "$srcdir"/PMOS.nmconnection \
              "$pkgdir"/etc/NetworkManager/system-connections/PMOS.nmconnection
          }
          EOF
          
          cat << 'EOF' > ~/.local/var/pmbootstrap/cache_git/pmaports/main/postmarketos-custom-config/PMOS.nmconnection
          [connection]
          id=PMOS
          type=wifi
          interface-name=wlan0
          autoconnect=true
          autoconnect-priority=-999

          [wifi]
          mode=ap
          ssid=PMOS

          [wifi-security]
          key-mgmt=wpa-psk
          psk=12345678

          [ipv4]
          method=shared

          [ipv6]
          method=ignore
          EOF
          
          cat << 'EOF' > ~/.local/var/pmbootstrap/cache_git/pmaports/main/postmarketos-custom-config/postmarketos-custom-config.post-install
          #!/bin/sh
          # Enable bluetooth service automatically on boot
          rc-update add bluetooth default || true
          EOF
          chmod +x ~/.local/var/pmbootstrap/cache_git/pmaports/main/postmarketos-custom-config/postmarketos-custom-config.post-install

          # Build custom package
          yes "y" | ./pmbootstrap/pmbootstrap.py checksum postmarketos-custom-config
          yes "y" | ./pmbootstrap/pmbootstrap.py build postmarketos-custom-config

      - name: Build Android Recovery Zip
        run: |
          # Build zip dengan password "pmOS!1234" (kita tidak bisa pakai username 'root', jadi kita buat username 'pmos')
          yes "y" | ./pmbootstrap/pmbootstrap.py install --password "pmOS!1234" --android-recovery-zip

      - name: Export and Upload Artifact
        run: |
          yes "y" | ./pmbootstrap/pmbootstrap.py export
          
      - name: Upload Recovery Zip
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-xiaomi-onclite-recovery
          path: /tmp/postmarketOS-export/*.zip
